name: Trigger docs site rebuild

on:
  push:
    branches: [main]
    paths: ["docs/**"]
  workflow_dispatch:
    inputs:
      repo_url:
        description: "Repository URL for the canonical docs source"
        required: false
        type: string
      ref:
        description: "Branch or tag to sync in the docs site repo"
        required: false
        type: string

jobs:
  notify-docs-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.DOCS_DISPATCH_APP_ID }}
          private-key: ${{ secrets.DOCS_DISPATCH_APP_KEY }}
          owner: shakacode
          repositories: react-on-django.com

      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: shakacode/react-on-django.com
          event-type: docs-updated
          client-payload: >-
            {"repo_url":"${{ github.event.inputs.repo_url || format('https://github.com/{0}.git', github.repository) }}","ref":"${{ github.event.inputs.ref || github.ref_name }}"}
