name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
        django-version: ["4.2.*", "5.1.*"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # django-rspack is a sibling package and is not published yet.
          python -m pip install "django-rspack @ git+https://github.com/shakacode/django-rspack.git@7b09b8baf8d23c822978fcb472672a811927f5e5"
          python -m pip install "Django==${{ matrix.django-version }}" -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest

  example-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: example/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # django-rspack is a sibling package and is not published yet.
          python -m pip install "django-rspack @ git+https://github.com/shakacode/django-rspack.git@7b09b8baf8d23c822978fcb472672a811927f5e5"
          python -m pip install -e '.[dev]'

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Install Playwright browser
        working-directory: example
        run: npx playwright install --with-deps chromium

      - name: Make example scripts executable
        run: chmod +x example/bin/dev example/bin/prod example/bin/test-ci

      - name: Run example smoke and Playwright suite
        working-directory: example
        run: ./bin/test-ci
