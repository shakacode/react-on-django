name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
        django-version: ["4.2.*", "5.1.*"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "Django==${{ matrix.django-version }}" -e .[dev]

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest

  example-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: example/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Install example dependencies
        working-directory: example
        run: npm ci

      - name: Install Playwright browser
        working-directory: example
        run: npx playwright install --with-deps chromium

      - name: Make example scripts executable
        run: chmod +x example/bin/dev example/bin/prod example/bin/test-ci example/scripts/smoke_stack.py

      - name: Run example smoke and Playwright suite
        working-directory: example
        run: ./bin/test-ci

      - name: Smoke example dev mode
        working-directory: example
        run: >
          python3 scripts/smoke_stack.py
          --base-url http://127.0.0.1:3110
          --path /
          --path /server_side_hello_world/
          --
          ./bin/dev dev --port=3110 --renderer-port=3910 --asset-port=3045

      - name: Smoke example static mode
        working-directory: example
        run: >
          python3 scripts/smoke_stack.py
          --base-url http://127.0.0.1:3111
          --path /
          --path /server_side_hello_world/
          --
          ./bin/dev static --port=3111 --renderer-port=3911 --asset-port=3046

      - name: Smoke example production mode
        working-directory: example
        run: >
          python3 scripts/smoke_stack.py
          --base-url http://127.0.0.1:3112
          --path /
          --path /server_side_hello_world/
          --
          ./bin/prod --renderer=fake --port=3112 --renderer-port=3912
